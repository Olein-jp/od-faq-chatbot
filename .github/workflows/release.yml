name: Build release package

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Build WordPress plugin zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate tag
        run: |
          set -euo pipefail

          if [[ ! "${GITHUB_REF_NAME}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must be in *.*.* numeric format, such as 1.2.3."
            exit 1
          fi

          git fetch origin main
          if ! git merge-base --is-ancestor "${GITHUB_SHA}" origin/main; then
            echo "The release tag must point to a commit on main."
            exit 1
          fi

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          coverage: none
          tools: composer:v2

      - name: Validate composer configuration
        run: composer validate

      - name: Install production dependencies
        run: composer install --no-dev --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Validate plugin version
        run: |
          set -euo pipefail

          PLUGIN_VERSION="$(php -r '$contents = file_get_contents("od-faq-chatbot.php"); preg_match("/^Version:\s*(.+)$/mi", $contents, $matches); echo isset($matches[1]) ? trim($matches[1]) : "";')"

          if [[ -z "${PLUGIN_VERSION}" ]]; then
            echo "Could not find the plugin Version header."
            exit 1
          fi

          if [[ "${PLUGIN_VERSION}" != "${GITHUB_REF_NAME}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match plugin Version header ${PLUGIN_VERSION}."
            exit 1
          fi

      - name: Build plugin package
        run: |
          set -euo pipefail

          PLUGIN_SLUG="od-faq-chatbot"
          PACKAGE_DIR="release/${PLUGIN_SLUG}"
          PACKAGE_FILE="${PLUGIN_SLUG}.zip"

          rm -rf release "${PACKAGE_FILE}"
          mkdir -p "${PACKAGE_DIR}"

          rsync -a \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='.wp-env/' \
            --exclude='node_modules/' \
            --exclude='release/' \
            --exclude='*.zip' \
            --exclude='package-lock.json' \
            --exclude='package.json' \
            --exclude='phpcs.xml.dist' \
            --exclude='.wp-env.json' \
            --exclude='.gitignore' \
            --exclude='AGENTS.md' \
            ./ "${PACKAGE_DIR}/"

          cd release
          zip -r "../${PACKAGE_FILE}" "${PLUGIN_SLUG}"

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          RELEASE_NOTES="WordPress plugin package for ${GITHUB_REF_NAME}."

          gh release create "${GITHUB_REF_NAME}" \
            od-faq-chatbot.zip \
            --repo "${GITHUB_REPOSITORY}" \
            --title "${GITHUB_REF_NAME}" \
            --notes "${RELEASE_NOTES}"
